<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Render Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Server Render Preview</h1>
          <p>Model file in <code>models/</code> -> Node.js render -> browser preview</p>
        </div>
        <div class="actions">
          <a href="/" class="nav-link">Open Browser Editor</a>
          <select id="fileSelect" aria-label="Model file"></select>
          <button id="refreshFilesBtn">Refresh Files</button>
          <button id="renderFileBtn">Render On Server</button>
          <button id="downloadStlBtn">Download STL</button>
        </div>
      </header>

      <main class="main-grid">
        <section class="parameter-panel">
          <div class="panel-head">
            <strong>Parameters</strong>
          </div>
          <div id="paramsContainer" class="params-list">
            <p class="empty-params">Select a file to see parameters</p>
          </div>
        </section>

        <section class="viewer-panel">
          <div class="viewer-head">
            <strong>Preview</strong>
            <span id="status">Idle</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="viewerCanvas"></canvas>
          </div>
          <pre id="logPanel" aria-live="polite"></pre>
        </section>
      </main>
    </div>

    <script type="module" src="./server-preview.js"></script>
  </body>
</html>
